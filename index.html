<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HUMSTO - Too dumb to sell. Too based to fail.</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
--primary: #ff69b4;
--secondary: #87ceeb;
--bg-start: #1a1a2e;
--bg-end: #0f0f1a;
--glow: rgba(255, 105, 180, 0.6);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: linear-gradient(135deg, var(--bg-start), var(--bg-end));
font-family: 'Comic Neue', cursive, sans-serif;
color: #fff;
overflow-x: hidden;
min-height: 100vh;
}

@keyframes float {
0%, 100% { transform: translateY(0) rotate(-2deg); }
50% { transform: translateY(-20px) rotate(2deg); }
}

@keyframes textGlow {
0%, 100% { text-shadow: 0 0 20px var(--glow); }
50% { text-shadow: 0 0 60px var(--glow), 0 0 100px var(--glow); }
}

@keyframes fadeInUp {
from { opacity: 0; transform: translateY(40px); }
to { opacity: 1; transform: translateY(0); }
}

@keyframes btnPulse {
0%, 100% { box-shadow: 0 0 20px var(--glow); }
50% { box-shadow: 0 0 50px var(--glow), 0 0 100px var(--glow); }
}

@keyframes derpy {
0%, 100% { transform: skewX(0deg) skewY(0deg) scale(1); }
15% { transform: skewX(3deg) skewY(-2deg) scale(1.02); }
30% { transform: skewX(-2deg) skewY(3deg) scale(0.98); }
45% { transform: skewX(4deg) skewY(1deg) scale(1.03); }
60% { transform: skewX(-3deg) skewY(-2deg) scale(0.97); }
75% { transform: skewX(2deg) skewY(3deg) scale(1.01); }
90% { transform: skewX(-1deg) skewY(-1deg) scale(0.99); }
}

@keyframes droolDrop {
0% { transform: translateY(-10px) scaleY(0.3); opacity: 0; }
10% { opacity: 0.7; transform: translateY(0) scaleY(1); }
90% { opacity: 0.5; }
100% { transform: translateY(100vh) scaleY(1.5); opacity: 0; }
}

@keyframes droolStretch {
0%, 100% { transform: scaleY(1) scaleX(1); }
50% { transform: scaleY(1.3) scaleX(0.8); }
}

@keyframes splat {
0% { transform: scale(0); opacity: 1; }
50% { transform: scale(1.5); opacity: 0.6; }
100% { transform: scale(0); opacity: 0; }
}

@keyframes eyeRoll {
0% { transform: translateY(0); }
100% { transform: translateY(-4px); }
}

@keyframes wobble {
0%, 100% { transform: rotate(0deg); }
25% { transform: rotate(3deg); }
75% { transform: rotate(-3deg); }
}

@keyframes paintDrip {
0% { height: 0; opacity: 0.8; }
100% { height: 40px; opacity: 0; }
}

/* Canvas */
#particleCanvas {
position: fixed;
top: 0; left: 0;
width: 100%; height: 100%;
pointer-events: none;
z-index: 9999;
}

/* Drool cursor trail canvas */
#droolCanvas {
position: fixed;
top: 0; left: 0;
width: 100%; height: 100%;
pointer-events: none;
z-index: 9998;
}

/* Drool waterfall */
.drool-container {
position: fixed;
top: 0; left: 0;
width: 100%; height: 100%;
pointer-events: none;
z-index: 50;
overflow: hidden;
}

.drool-drop {
position: absolute;
top: -20px;
width: 6px;
background: linear-gradient(180deg, rgba(135,206,235,0.0), rgba(135,206,235,0.4), rgba(135,206,235,0.6), rgba(135,206,235,0.2));
border-radius: 0 0 50% 50%;
animation: droolDrop linear infinite;
filter: blur(1px);
}

.drool-drop::after {
content: '';
position: absolute;
bottom: -4px;
left: 50%;
transform: translateX(-50%);
width: 8px;
height: 8px;
background: rgba(135,206,235,0.5);
border-radius: 50%;
}

/* NAVBAR */
.navbar {
position: fixed;
top: 0; left: 0; right: 0;
z-index: 1000;
padding: 12px 30px;
display: flex;
justify-content: space-between;
align-items: center;
background: rgba(26, 26, 46, 0.7);
backdrop-filter: blur(15px);
border-bottom: 2px solid var(--primary);
border-bottom-style: dashed;
}

.nav-logo {
font-family: 'Bangers', cursive;
font-size: 1.8rem;
color: var(--primary);
animation: textGlow 3s infinite;
text-decoration: none;
cursor: pointer;
}

.nav-links {
display: flex;
gap: 20px;
align-items: center;
}

.nav-links a {
color: #ccc;
text-decoration: none;
font-family: 'Comic Neue', cursive;
font-weight: 700;
font-size: 0.95rem;
transition: color 0.3s;
}

.nav-links a:hover { color: var(--primary); }

.nav-buy-btn {
background: var(--primary);
color: #000;
border: 3px solid #fff;
border-radius: 4px;
padding: 8px 22px;
font-family: 'Bangers', cursive;
font-size: 1.1rem;
cursor: pointer;
animation: btnPulse 2s infinite;
text-decoration: none;
transform: rotate(-1deg);
transition: transform 0.2s;
}

.nav-buy-btn:hover {
transform: rotate(2deg) scale(1.1);
}

/* HERO */
.hero {
min-height: 100vh;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
text-align: center;
padding: 100px 20px 60px;
position: relative;
}

.hero-mascot-wrapper {
position: relative;
margin-bottom: 20px;
}

.hero .mascot {
width: 280px;
height: 280px;
object-fit: contain;
animation: float 3s ease-in-out infinite;
filter: drop-shadow(0 0 30px var(--glow));
border: 4px dashed var(--primary);
border-radius: 20px;
image-rendering: pixelated;
}

.mascot-drool {
position: absolute;
bottom: -30px;
left: 50%;
transform: translateX(-50%);
width: 12px;
height: 40px;
background: linear-gradient(180deg, rgba(135,206,235,0.6), rgba(135,206,235,0.2));
border-radius: 0 0 50% 50%;
animation: droolStretch 1.5s ease-in-out infinite;
transition: height 0.3s;
}

.mascot-drool-2 {
position: absolute;
bottom: -25px;
left: 45%;
width: 8px;
height: 30px;
background: linear-gradient(180deg, rgba(135,206,235,0.4), rgba(135,206,235,0.1));
border-radius: 0 0 50% 50%;
animation: droolStretch 2s ease-in-out infinite 0.5s;
}

.mascot-eyes {
position: absolute;
top: 35%;
left: 50%;
transform: translateX(-50%);
display: flex;
gap: 40px;
pointer-events: none;
opacity: 0;
transition: opacity 0.5s;
}

.mascot-eye {
width: 20px;
height: 20px;
background: #fff;
border-radius: 50%;
position: relative;
}

.mascot-eye::after {
content: '';
position: absolute;
width: 8px;
height: 8px;
background: #000;
border-radius: 50%;
top: 2px;
left: 6px;
transition: transform 0.3s;
}

.hero h1 {
font-family: 'Bangers', cursive;
font-size: clamp(3rem, 8vw, 6rem);
background: linear-gradient(135deg, var(--primary), var(--secondary), var(--primary));
background-size: 200% 200%;
-webkit-background-clip: text;
-webkit-text-fill-color: transparent;
background-clip: text;
animation: textGlow 3s infinite;
margin-bottom: 10px;
letter-spacing: 4px;
transform: rotate(-1deg);
}

.hero-slogan {
font-size: clamp(1.1rem, 3vw, 1.6rem);
color: var(--secondary);
font-weight: 700;
margin-bottom: 30px;
min-height: 2em;
border-right: 3px solid var(--primary);
white-space: nowrap;
overflow: hidden;
max-width: fit-content;
}

.hero-buttons {
display: flex;
gap: 15px;
flex-wrap: wrap;
justify-content: center;
margin-bottom: 25px;
}

.btn-primary {
background: var(--primary);
color: #000;
border: 3px solid #fff;
border-radius: 4px;
padding: 14px 35px;
font-family: 'Bangers', cursive;
font-size: 1.3rem;
cursor: pointer;
animation: btnPulse 2s infinite, derpy 4s ease-in-out infinite;
text-decoration: none;
transform: rotate(1deg);
transition: transform 0.2s;
}

.btn-primary:hover { transform: rotate(-2deg) scale(1.15); }

.btn-secondary {
background: transparent;
color: var(--secondary);
border: 3px dashed var(--secondary);
border-radius: 4px;
padding: 14px 35px;
font-family: 'Bangers', cursive;
font-size: 1.3rem;
cursor: pointer;
text-decoration: none;
transform: rotate(-1deg);
transition: all 0.3s;
}

.btn-secondary:hover {
background: var(--secondary);
color: #000;
transform: rotate(2deg) scale(1.1);
}

.btn-chart {
background: rgba(255,255,255,0.1);
color: #fff;
border: 2px solid rgba(255,255,255,0.3);
border-radius: 4px;
padding: 14px 35px;
font-family: 'Bangers', cursive;
font-size: 1.3rem;
cursor: pointer;
text-decoration: none;
transform: rotate(0.5deg);
transition: all 0.3s;
}

.btn-chart:hover {
border-color: var(--primary);
color: var(--primary);
transform: rotate(-1deg) scale(1.05);
}

.ca-container {
background: rgba(255,255,255,0.05);
border: 2px dashed var(--primary);
border-radius: 8px;
padding: 12px 20px;
display: flex;
align-items: center;
gap: 10px;
cursor: pointer;
transition: all 0.3s;
max-width: 500px;
position: relative;
overflow: hidden;
}

.ca-container:hover {
background: rgba(255,105,180,0.1);
transform: scale(1.02);
}

.ca-label {
color: var(--primary);
font-weight: 700;
font-size: 0.9rem;
white-space: nowrap;
}

.ca-address {
color: #aaa;
font-size: 0.8rem;
word-break: break-all;
font-family: monospace;
}

.ca-copy-msg {
position: absolute;
top: 50%;
left: 50%;
transform: translate(-50%, -50%);
background: var(--primary);
color: #000;
padding: 5px 15px;
border-radius: 4px;
font-weight: 700;
display: none;
z-index: 10;
}

/* Paint drips decoration */
.paint-drip {
position: absolute;
width: 8px;
background: var(--primary);
border-radius: 0 0 50% 50%;
opacity: 0.3;
}

/* STATS */
.stats-section {
padding: 80px 20px;
position: relative;
}

.stats-section::before {
content: '';
position: absolute;
top: 0; left: 0; right: 0;
height: 3px;
background: linear-gradient(90deg, transparent, var(--primary), var(--secondary), var(--primary), transparent);
}

.section-title {
font-family: 'Bangers', cursive;
font-size: clamp(2rem, 5vw, 3rem);
text-align: center;
margin-bottom: 50px;
color: var(--primary);
animation: textGlow 3s infinite;
transform: rotate(-1deg);
}

.stats-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
gap: 25px;
max-width: 900px;
margin: 0 auto;
}

.stat-card {
background: rgba(255, 255, 255, 0.05);
backdrop-filter: blur(10px);
border: 2px solid rgba(255, 105, 180, 0.3);
border-radius: 8px;
padding: 30px;
text-align: center;
animation: derpy 6s ease-in-out infinite;
position: relative;
overflow: hidden;
}

.stat-card::before {
content: '';
position: absolute;
top: -2px;
left: -2px;
right: -2px;
height: 4px;
background: linear-gradient(90deg, var(--primary), var(--secondary));
}

.stat-card::after {
content: '';
position: absolute;
bottom: 0; right: 0;
width: 30px;
height: 30px;
background: rgba(135,206,235,0.1);
border-radius: 50%;
animation: splat 3s infinite;
}

.stat-number {
font-family: 'Bangers', cursive;
font-size: 2.5rem;
color: var(--primary);
margin-bottom: 8px;
}

.stat-label {
color: var(--secondary);
font-weight: 700;
font-size: 1rem;
}

/* ABOUT */
.about-section {
padding: 80px 20px;
}

.about-grid {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
gap: 25px;
max-width: 1100px;
margin: 0 auto;
}

.about-card {
background: rgba(255,255,255,0.03);
border: 3px solid rgba(255,105,180,0.2);
border-radius: 4px;
padding: 30px;
text-align: center;
animation: derpy 5s ease-in-out infinite;
position: relative;
border-style: dashed;
transform: rotate(-0.5deg);
}

.about-card:nth-child(2) {
transform: rotate(0.5deg);
animation-delay: 0.5s;
}

.about-card:nth-child(3) {
transform: rotate(-0.3deg);
animation-delay: 1s;
}

.about-card::before {
content: '';
position: absolute;
top: -1px; left: 20px;
width: 40px;
height: 6px;
background: var(--primary);
opacity: 0.5;
animation: paintDrip 4s infinite;
border-radius: 0 0 50% 50%;
}

.about-icon {
font-size: 3.5rem;
margin-bottom: 15px;
display: block;
animation: wobble 2s ease-in-out infinite;
}

.about-card h3 {
font-family: 'Bangers', cursive;
font-size: 1.5rem;
color: var(--primary);
margin-bottom: 12px;
}

.about-card p {
color: #bbb;
line-height: 1.6;
font-size: 0.95rem;
}

/* Personality section */
.personality-section {
padding: 40px 20px 80px;
text-align: center;
}

.personality-box {
max-width: 800px;
margin: 0 auto;
background: rgba(255,255,255,0.03);
border: 3px dashed var(--secondary);
border-radius: 8px;
padding: 30px;
position: relative;
animation: derpy 8s ease-in-out infinite;
}

.personality-box p {
color: #ccc;
font-size: 1.1rem;
line-height: 1.8;
font-style: italic;
}

.personality-box::before {
content: '🐹';
position: absolute;
top: -20px;
left: 20px;
font-size: 2rem;
animation: float 3s ease-in-out infinite;
}

.personality-box::after {
content: '🤤';
position: absolute;
bottom: -20px;
right: 20px;
font-size: 2rem;
animation: float 3s ease-in-out infinite 1s;
}

/* TOKENOMICS */
.tokenomics-section {
padding: 80px 20px;
}

.tokenomics-content {
display: flex;
flex-wrap: wrap;
gap: 40px;
justify-content: center;
align-items: center;
max-width: 900px;
margin: 0 auto;
}

.donut-chart {
width: 250px;
height: 250px;
border-radius: 50%;
background: conic-gradient(
var(--primary) 0deg 180deg,
var(--secondary) 180deg 270deg,
#ff6b6b 270deg 324deg,
#ffd93d 324deg 360deg
);
position: relative;
animation: derpy 6s ease-in-out infinite;
border: 3px dashed rgba(255,255,255,0.2);
}

.donut-chart::after {
content: '🐹';
position: absolute;
top: 50%; left: 50%;
transform: translate(-50%, -50%);
width: 100px;
height: 100px;
background: var(--bg-start);
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
font-size: 2.5rem;
border: 2px dashed var(--primary);
}

.tokenomics-list {
list-style: none;
}

.tokenomics-list li {
padding: 12px 0;
display: flex;
align-items: center;
gap: 12px;
font-size: 1.05rem;
font-weight: 700;
border-bottom: 1px dashed rgba(255,255,255,0.1);
}

.token-dot {
width: 16px;
height: 16px;
border-radius: 3px;
display: inline-block;
}

/* ROADMAP */
.roadmap-section {
padding: 80px 20px;
}

.roadmap-timeline {
max-width: 700px;
margin: 0 auto;
position: relative;
padding-left: 40px;
}

.roadmap-timeline::before {
content: '';
position: absolute;
left: 15px;
top: 0;
bottom: 0;
width: 3px;
background: linear-gradient(180deg, var(--primary), var(--secondary), var(--primary));
border-radius: 3px;
}

.roadmap-item {
position: relative;
margin-bottom: 40px;
padding: 20px;
background: rgba(255,255,255,0.03);
border: 2px dashed rgba(255,105,180,0.2);
border-radius: 8px;
animation: derpy 7s ease-in-out infinite;
}

.roadmap-item:nth-child(2) { animation-delay: 0.5s; }
.roadmap-item:nth-child(3) { animation-delay: 1s; }
.roadmap-item:nth-child(4) { animation-delay: 1.5s; }

.roadmap-item::before {
content: '';
position: absolute;
left: -33px;
top: 25px;
width: 16px;
height: 16px;
border-radius: 50%;
border: 3px solid var(--primary);
background: var(--bg-start);
}

.roadmap-item.done::before {
background: var(--primary);
box-shadow: 0 0 15px var(--glow);
}

.roadmap-item.active::before {
background: var(--secondary);
box-shadow: 0 0 15px rgba(135,206,235,0.6);
animation: btnPulse 2s infinite;
}

.roadmap-item.upcoming::before {
background: transparent;
}

.roadmap-phase {
font-family: 'Bangers', cursive;
font-size: 0.9rem;
color: var(--secondary);
margin-bottom: 4px;
}

.roadmap-title {
font-family: 'Bangers', cursive;
font-size: 1.4rem;
color: var(--primary);
margin-bottom: 10px;
}

.roadmap-status {
display: inline-block;
font-size: 0.75rem;
padding: 2px 10px;
border-radius: 3px;
margin-bottom: 10px;
font-weight: 700;
}

.status-done {
background: rgba(0,255,0,0.2);
color: #0f0;
border: 1px solid rgba(0,255,0,0.3);
}

.status-active {
background: rgba(135,206,235,0.2);
color: var(--secondary);
border: 1px solid rgba(135,206,235,0.3);
animation: btnPulse 2s infinite;
}

.status-upcoming {
background: rgba(255,255,255,0.1);
color: #888;
border: 1px solid rgba(255,255,255,0.1);
}

.roadmap-items {
list-style: none;
}

.roadmap-items li {
color: #bbb;
padding: 4px 0;
font-size: 0.95rem;
}

.roadmap-items li::before {
content: '🐹 ';
font-size: 0.8rem;
}

/* HOW TO BUY */
.buy-section {
padding: 80px 20px;
}

.buy-steps {
display: grid;
grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
gap: 25px;
max-width: 1000px;
margin: 0 auto;
}

.buy-step {
background: rgba(255,255,255,0.03);
border: 2px dashed rgba(135,206,235,0.3);
border-radius: 8px;
padding: 25px;
text-align: center;
position: relative;
animation: derpy 5s ease-in-out infinite;
}

.buy-step:nth-child(2) { animation-delay: 0.3s; }
.buy-step:nth-child(3) { animation-delay: 0.6s; }
.buy-step:nth-child(4) { animation-delay: 0.9s; }

.step-number {
font-family: 'Bangers', cursive;
font-size: 2.5rem;
color: var(--primary);
opacity: 0.3;
position: absolute;
top: 5px;
right: 15px;
}

.step-icon {
font-size: 2.5rem;
margin-bottom: 12px;
display: block;
animation: wobble 3s ease-in-out infinite;
}

.buy-step h3 {
font-family: 'Bangers', cursive;
font-size: 1.2rem;
color: var(--secondary);
margin-bottom: 8px;
}

.buy-step p {
color: #aaa;
font-size: 0.9rem;
line-height: 1.5;
}

/* GAME */
.game-section {
padding: 80px 20px;
text-align: center;
}

.game-container {
max-width: 500px;
margin: 0 auto;
background: rgba(255,255,255,0.03);
border: 3px dashed var(--primary);
border-radius: 12px;
padding: 40px 20px;
position: relative;
}

.game-mascot {
width: 150px;
height: 150px;
object-fit: contain;
cursor: pointer;
transition: transform 0.1s;
animation: float 3s ease-in-out infinite;
filter: drop-shadow(0 0 20px var(--glow));
border-radius: 15px;
user-select: none;
-webkit-user-select: none;
}

.game-mascot:active {
transform: scale(0.9) rotate(10deg) !important;
}

.game-score {
font-family: 'Bangers', cursive;
font-size: 2.5rem;
color: var(--primary);
margin: 15px 0;
animation: textGlow 3s infinite;
}

.game-level {
color: var(--secondary);
font-weight: 700;
font-size: 1.1rem;
margin-bottom: 10px;
}

.game-title-label {
font-family: 'Bangers', cursive;
font-size: 1rem;
color: #888;
margin-bottom: 5px;
}

.click-effect {
position: absolute;
font-family: 'Bangers', cursive;
font-size: 1.5rem;
color: var(--primary);
pointer-events: none;
animation: clickFloat 1s ease-out forwards;
z-index: 100;
}

@keyframes clickFloat {
0% { opacity: 1; transform: translateY(0) scale(1); }
100% { opacity: 0; transform: translateY(-80px) scale(1.5); }
}

.game-progress-bar {
width: 100%;
height: 12px;
background: rgba(255,255,255,0.1);
border-radius: 6px;
margin-top: 15px;
overflow: hidden;
border: 1px dashed rgba(255,105,180,0.3);
}

.game-progress-fill {
height: 100%;
background: linear-gradient(90deg, var(--primary), var(--secondary));
border-radius: 6px;
transition: width 0.3s;
width: 0%;
}

/* COMMUNITY */
.community-section {
padding: 80px 20px;
text-align: center;
}

.community-links {
display: flex;
gap: 25px;
justify-content: center;
flex-wrap: wrap;
max-width: 800px;
margin: 0 auto;
}

.community-link {
display: flex;
flex-direction: column;
align-items: center;
gap: 10px;
padding: 25px 40px;
background: rgba(255,255,255,0.03);
border: 2px dashed rgba(255,105,180,0.3);
border-radius: 8px;
text-decoration: none;
color: #fff;
transition: all 0.3s;
animation: derpy 5s ease-in-out infinite;
min-width: 180px;
}

.community-link:nth-child(2) { animation-delay: 0.5s; }
.community-link:nth-child(3) { animation-delay: 1s; }

.community-link:hover {
border-color: var(--primary);
background: rgba(255,105,180,0.1);
transform: scale(1.05) rotate(1deg);
}

.community-link .link-icon {
font-size: 2.5rem;
}

.community-link .link-name {
font-family: 'Bangers', cursive;
font-size: 1.2rem;
color: var(--primary);
}

.community-link .link-handle {
color: #888;
font-size: 0.85rem;
}

/* FOOTER */
.footer {
padding: 40px 20px;
text-align: center;
border-top: 2px dashed rgba(255,105,180,0.2);
}

.footer p {
color: #555;
font-size: 0.8rem;
max-width: 600px;
margin: 0 auto;
line-height: 1.6;
}

.footer .footer-logo {
font-family: 'Bangers', cursive;
font-size: 1.5rem;
color: var(--primary);
margin-bottom: 15px;
animation: textGlow 3s infinite;
}

/* Paint splotches */
.paint-splotch {
position: absolute;
border-radius: 50%;
opacity: 0.05;
pointer-events: none;
}

/* Responsive */
@media (max-width: 768px) {
.navbar { padding: 10px 15px; }
.nav-links a { display: none; }
.hero .mascot { width: 200px; height: 200px; }
.hero h1 { font-size: 2.5rem; }
.stats-grid { grid-template-columns: 1fr; }
.about-grid { grid-template-columns: 1fr; }
.buy-steps { grid-template-columns: 1fr 1fr; }
.tokenomics-content { flex-direction: column; }
.roadmap-timeline { padding-left: 30px; }
}

/* Scrollbar */
::-webkit-scrollbar { width: 8px; }
::-webkit-scrollbar-track { background: var(--bg-end); }
::-webkit-scrollbar-thumb { background: var(--primary); border-radius: 4px; }
::-webkit-scrollbar-thumb:hover { background: var(--secondary); }

/* Paint border style */
.paint-border {
position: relative;
}
.paint-border::after {
content: '';
position: absolute;
bottom: -5px;
left: 10%;
right: 10%;
height: 3px;
background: var(--primary);
opacity: 0.2;
border-radius: 50%;
filter: blur(2px);
}
</style>
</head>
